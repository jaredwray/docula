name: release

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: write
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Enable Corepack
      run: corepack enable

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Testing
      run: pnpm test:ci

    - name: Publish
      run: pnpm -r publish --no-git-checks --provenance
