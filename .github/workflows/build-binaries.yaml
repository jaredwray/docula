name: build-binaries

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: docula-linux-x64
            binary: docula
          - os: macos-latest
            artifact: docula-macos-arm64
            binary: docula
          - os: windows-latest
            artifact: docula-windows-x64
            binary: docula.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install

      - name: Build Binary
        run: pnpm build:binary

      - name: Smoke Test Binary
        shell: bash
        run: |
          ./dist/${{ matrix.binary }} version
          ./dist/${{ matrix.binary }} build -s ./test/fixtures/single-page-site -o ./smoke-dist
          test -f ./smoke-dist/index.html

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} dist/${{ matrix.binary }}#${{ matrix.artifact }} --clobber
